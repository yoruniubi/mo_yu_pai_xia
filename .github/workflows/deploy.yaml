name: "Deploy Godot to GitHub Pages"
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # 关键步骤：在云端临时关闭 Android 和 Windows 预设的激活状态
      # 这样 Godot 就不会因为找不到 Android SDK 而报错了
      - name: Disable other presets for CI
        run: |
          sed -i '/name="Android"/,/runnable=true/s/runnable=true/runnable=false/' export_presets.cfg
          sed -i '/name="Windows Desktop"/,/runnable=true/s/runnable=true/runnable=false/' export_presets.cfg

      - name: Godot Export (Manual Setup)
        run: |
          # 0. 构建轻量 Emoji 子集字体（避免直接打包 20MB+ 全量字体）
          mkdir -p Assets/Fonts
          python -m pip install --quiet fonttools
          wget -nv -O /tmp/NotoColorEmoji.ttf https://raw.githubusercontent.com/googlefonts/noto-emoji/main/fonts/NotoColorEmoji.ttf

          python - <<'PY'
          from pathlib import Path

          # 项目内实际用到的 Emoji（可按需继续补充）
          emoji_text = "⌨️💧🛡️🤡☕💩💤🍞🏃💡👍📑🤝🔋📉📞🥪💻📅📁📣🛠️💼🖱️📧🏢🧘💰📄🥂💾🔌🧼📦📢🕸️🔥💣🧨🌋🐙💨🌊🌀📊📈❌📋⏳🚫🪐☀️"

          uniq = []
          for ch in emoji_text:
              if ch not in uniq:
                  uniq.append(ch)

          Path("Assets/Fonts/emoji_subset_chars.txt").write_text("".join(uniq), encoding="utf-8")
          PY

          python -m fontTools.subset /tmp/NotoColorEmoji.ttf \
            --output-file=Assets/Fonts/EmojiSubset.ttf \
            --text-file=Assets/Fonts/emoji_subset_chars.txt \
            --layout-features='*' \
            --glyph-names --symbol-cmap --legacy-cmap \
            --notdef-glyph --notdef-outline --recommended-glyphs \
            --name-IDs='*' --name-legacy --name-languages='*'

          ls -lh Assets/Fonts/EmojiSubset.ttf

          # 1. 创建目录
          mkdir -p ~/.local/share/godot/export_templates/4.5.1.stable
          mkdir -p web

          # 2. 下载 (使用你确认成功的 URL)
          wget -nv https://godot-releases.nbg1.your-objectstorage.com/4.5.1-stable/Godot_v4.5.1-stable_linux.x86_64.zip
          wget -nv https://godot-releases.nbg1.your-objectstorage.com/4.5.1-stable/Godot_v4.5.1-stable_export_templates.tpz

          # 3. 解压 Godot 可执行文件
          unzip Godot_v4.5.1-stable_linux.x86_64.zip
          chmod +x Godot_v4.5.1-stable_linux.x86_64

          # 4. 解压模板 (使用 || true 强制忽略那个多余字节的报错)
          unzip Godot_v4.5.1-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.5.1.stable || true
          # 将解压出来的内容移到正确的位置 (模板内部通常包裹一层 templates/ 文件夹)
          mv ~/.local/share/godot/export_templates/4.5.1.stable/templates/* ~/.local/share/godot/export_templates/4.5.1.stable/

          # 5. 执行导出 (明确指定 Web 预设)
          ./Godot_v4.5.1-stable_linux.x86_64 --headless --path . --export-release "Web" web/index.html

      - name: Patch for GitHub Pages (SharedArrayBuffer)
        run: |
          cd web
          wget https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js
          sed -i 's|<script|<script src="coi-serviceworker.js"></script><script|' index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web
          branch: gh-pages